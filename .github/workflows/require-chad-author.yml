name: Require chad@tindel.net author
on: [pull_request, push]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Verify all commit authors are allowed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          zero=0000000000000000000000000000000000000000
          if [ -z "$base" ] || [ "$base" = "$zero" ]; then
            range="$head"
          else
            range="$base..$head"
          fi
          allow='^(chad@tindel\.net|1863749\+ctindel@users\.noreply\.github\.com|noreply@github\.com|[0-9]+\+github-actions\[bot\]@users\.noreply\.github\.com)$'
          bad=$(git log --format='%H %ae' "$range" \
            | awk -v re="$allow" '$2 !~ re {print}')
          if [ -n "$bad" ]; then
            echo "::error::commits not authored by chad@tindel.net (or allowed bot):"
            echo "$bad"
            exit 1
          fi
